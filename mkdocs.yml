site_url: https://trifonov.me/
site_name: SmartHome
strict: true
theme:
  name: material
  logo: assets/logo.svg
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
        - locale: es
          name: Español
          build: true
        - locale: fr
          name: Français
          build: true

nav:
  - Home: en/index.md
  - Hardware: en/hardware.md
  - Главная: ru/index.md
  - Оборудование: ru/hardware.md
