site_url: https://trifonov.me/
site_name: SmartHome
theme:
  name: material
  logo: assets/logo.svg
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
        - locale: ru
          name: Русский
        - locale: es
          name: Español
        - locale: fr
          name: Français
