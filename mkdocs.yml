site_url: https://trifonov.me/
site_name: SmartHome
strict: true
theme:
  name: material
  logo: assets/logo.svg
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
  extra_css:
    - stylesheets/extra.css

