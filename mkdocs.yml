      - GOG CLI: ru/gog-cli.md
      - Immich: ru/immich.md
      - Logging: ru/logging.md
      - Tech Stack: ru/tech-stack.md
  - Español:
      - Hardware: es/hardware.md
  - Français:
      - Hardware: fr/hardware.md
  - EN: en/index.md
  - RU: ru/index.md
  - ES: es/index.md
  - FR: fr/index.md
